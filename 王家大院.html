<h1>王家大院</h1>

<h2>景点介绍</h2>
<p>王家大院位于山西灵石县，是清代晋商巨贾王氏家族的宅院，被誉为“华夏民居第一宅”“民间故宫”。
大院依山而建，规模宏大，砖雕、木雕、石雕精美绝伦，是北方民居建筑的典范。</p >

<h2>必看亮点</h2>
<ul>
<li>高家崖建筑群</li>
<li>红门堡城堡式院落</li>
<li>三雕艺术：木雕、砖雕、石雕</li>
<li>登高俯瞰全院全景</li>
</ul>

<table>
<tr><th>票种</th><th>旺季</th><th>淡季</th></tr>

<tr><td>免票</td><td colspan="2">老人、儿童、军人</td></tr>
</table>

<h2>推荐游览路线</h2>
<p>入口 → 高家崖 → 凝瑞居 → 红门堡 → 石桥连堡 → 司马院 → 顶甲花园 → 出口</p >

<h2>交通指南</h2>
<p>距平遥古城约50公里<br>
自驾导航：王家大院<br>
平遥、灵石东站均有班车可达</p >

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>热力图</title>
    <style>
        html,body{
            margin:0;
            padding:0;
            width:100%;
            height:100%;
            background:#111827;
        }
        #container{
            width:100%;
            height:100%;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script>
        var myChart = echarts.init(document.getElementById('container'));

        var data = [
            {name:'太原市',value:38},
            {name:'大同市',value:32},
            {name:'阳泉市',value:11},
            {name:'长治市',value:74},
            {name:'晋城市',value:72},
            {name:'朔州市',value:8},
            {name:'忻州市',value:36},
            {name:'晋中市',value:70},
            {name:'临汾市',value:54},
            {name:'运城市',value:103},
            {name:'吕梁市',value:39}
        ];

        var option = {
            backgroundColor:'#111827',
            visualMap: {
                min: 0,
                max: 110,
                color: ['blue','cyan','yellow','red']
            },
            series: [
                {
                    type: 'map',
                    map: 'china',
                    data: data,
                    nameMap: {
                        '太原市':'太原市','大同市':'大同市','阳泉市':'阳泉市','长治市':'长治市','晋城市':'晋城市',
                        '朔州市':'朔州市','忻州市':'忻州市','晋中市':'晋中市','临汾市':'临汾市','运城市':'运城市','吕梁市':'吕梁市'
                    },
                    label:{show:true,color:'#fff'}
                }
            ]
        };

        myChart.setOption(option);
        window.addEventListener('resize', function () { myChart.resize(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>山西国保热力榜</title>
    <style>
        html,body{margin:0;padding:0;width:100%;height:100%}
        #heatmap{width:100%;height:100%}
    </style>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
</head>
<body>
    <div id="heatmap"></div>
    <script>
        const shanxiJson = {
            "type":"FeatureCollection",
            "features": [
                {"properties":{"name":"太原市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[112.5,37.8]]]}}},
                {"properties":{"name":"大同市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.3,40.1]]]}}},
                {"properties":{"name":"阳泉市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.6,37.9]]]}}},
                {"properties":{"name":"长治市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.1,36.2]]]}}},
                {"properties":{"name":"晋城市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[112.9,35.5]]]}}},
                {"properties":{"name":"朔州市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[112.5,39.4]]]}}},
                {"properties":{"name":"忻州市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[112.8,38.4]]]}}},
                {"properties":{"name":"晋中市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[112.8,37.7]]]}}},
                {"properties":{"name":"临汾市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[111.6,36.1]]]}}},
                {"properties":{"name":"运城市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[111.0,35.1]]]}}},
                {"properties":{"name":"吕梁市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[111.2,37.6]]]}}}
            ]
        };

        const data = [
            {name:"运城市",value:103},{name:"长治市",value:74},{name:"晋城市",value:72},
            {name:"晋中市",value:70},{name:"临汾市",value:54},{name:"吕梁市",value:39},
            {name:"太原市",value:38},{name:"忻州市",value:36},{name:"大同市",value:32},
            {name:"阳泉市",value:11},{name:"朔州市",value:8}
        ];

        const chart = echarts.init(document.getElementById('heatmap'));
        echarts.registerMap('山西', shanxiJson);

        chart.setOption({
            backgroundColor:'#fff',
            title:{text:'山西国保热力榜',left:'center'},
            tooltip:{trigger:'item'},
            visualMap:{min:0,max:110,right:'10%',top:'center',inRange:{color:['#FFE','#FC0','#F80','#F40','#F00']}},
            series:[{type:'map',map:'山西',data:data,zoom:1.2,label:{show:true}}]
        });

        window.addEventListener('resize',()=>chart.resize());
    </script>
</body>
</html>

<h1>晋 祠</h1>

<h2>景点介绍</h2>
<p>晋祠位于山西太原，是中国现存最早的皇家祭祀园林，距今已有1500多年历史。这里依山傍水，古建成群，以**周柏、难老泉、宋代侍女像**三绝闻名，被誉为“三晋第一名胜”。</p >

<h2>必看景点</h2>
<ul>
<li>圣母殿（宋代古建筑）</li>
<li>鱼沼飞梁（十字桥，国内孤例）</li>
<li>难老泉（晋水源头）</li>
<li>周柏（千年古树）</li>
</ul>

<h2>门票信息</h2>
<table>
<tr><th>票种</th><th>价格</th></tr>
<tr><td>成人票</td><td>80元</td></tr>
<tr><td>学生票</td><td>半价</td></tr>
<tr><td>免票</td><td>老人、儿童、军人</td></tr>
</table>

<h2>游览路线</h2>
<p>入口 → 水镜台 → 金人台 → 献殿 → 鱼沼飞梁 → 圣母殿 → 难老泉 → 周柏 → 出口</p >

<h2>交通指南</h2>
<p>公交：乘坐79路、308路、804路直达<br>
自驾：导航“晋祠博物馆”即可</p >
